name: Deploy Frontend To GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
      VITE_API_STYLE: ${{ vars.VITE_API_STYLE || 'apps-script' }}
      VITE_API_PREFIX: ${{ vars.VITE_API_PREFIX || '/api' }}
      VITE_AUTO_REFRESH_MS: ${{ vars.VITE_AUTO_REFRESH_MS || '30000' }}
      VITE_ROUTER_MODE: ${{ vars.VITE_ROUTER_MODE || 'hash' }}
      VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || '/Monitoring/' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
